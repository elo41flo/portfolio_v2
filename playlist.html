<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Playlist - Eloise Robert</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="phone profile-page spotify-bg">
        <header class="fixed-ui">
            <div class="status-bar">
                <span id="clock">00:00</span>
                <div class="status-icons">
                    <span>📶</span>
                    <span>100% 🔋</span>
                </div>
            </div>
        </header>

        <article class="content-scroll">
            <div class="playlist-header">
                <div class="playlist-cover">
                    <img src="img/couv_playlist.webp" alt="Cover Playlist">
                </div>
                <h1>Mes pépites</h1>
                <p class="playlist-info">Playlist · Éloïse Robert</p>
                <div class="play-actions">
                    <button class="play-btn">▶</button>
                </div>
            </div>

            <ul class="song-list">
                <li class="song-item">
                    <div class="song-info">
                        <span class="song-title">One Life</span>
                        <span class="song-artist">Bigflo & Oli</span>
                    </div>
                </li>
                <li class="song-item">
                    <div class="song-info">
                        <span class="song-title">Heureux</span>
                        <span class="song-artist">Heroe</span>
                    </div>
                </li>
                <li class="song-item">
                    <div class="song-info">
                        <span class="song-title">Tout savoir</span>
                        <span class="song-artist">Adé</span>
                    </div>
                </li>
                <li class="song-item">
                    <div class="song-info">
                        <span class="song-title">Sur la lune</span>
                        <span class="song-artist">Bigflo & Oli</span>
                    </div>
                </li>
                <li class="song-item">
                    <div class="song-info">
                        <span class="song-title">Dans tes yeux</span>
                        <span class="song-artist">Heroe</span>
                    </div>
                </li>
            </ul>
        </article>

        <footer class="phone-footer">
            <button type="button" class="back-button" onclick="window.history.back()">
                <img src="img/retour.webp" alt="Retour">
            </button>
            <a href="index.html" class="home-button">
                <div class="home-bar"></div>
            </a>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
